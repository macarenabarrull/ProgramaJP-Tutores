    <style>
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: #f8fafc; /* Lighter Slate */
        color: #0f172a; /* Deep Slate */
        overflow: hidden;
      }

      .font-display {
        font-family: 'Outfit', sans-serif;
      }

      .font-space {
        font-family: 'Space Grotesk', sans-serif;
      }
      
      /* Noise Texture Overlay */
      .bg-noise {
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        opacity: 0.015;
        pointer-events: none;
      }

      /* Mesh Gradient Backgrounds */
      .bg-mesh-indigo {
        background: radial-gradient(at 0% 0%, hsla(225, 100%, 95%, 1) 0, transparent 50%),
                    radial-gradient(at 50% 0%, hsla(225, 100%, 90%, 1) 0, transparent 50%),
                    radial-gradient(at 100% 0%, hsla(225, 100%, 95%, 1) 0, transparent 50%);
      }
      
      /* Aurora Animation Keyframes */
      @keyframes blob {
        0% { transform: translate(0px, 0px) scale(1); }
        33% { transform: translate(30px, -50px) scale(1.2); }
        66% { transform: translate(-20px, 20px) scale(0.8); }
        100% { transform: translate(0px, 0px) scale(1); }
      }
      
      .animate-blob {
        animation: blob 10s infinite;
      }
      
      .animation-delay-2000 {
        animation-delay: 2s;
      }
      
      .animation-delay-4000 {
        animation-delay: 4s;
      }

      @keyframes shine {
        0% { left: -100%; }
        100% { left: 100%; }
      }
      
      .animate-shine {
        animation: shine 1.5s infinite;
      }

      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: #e9d5ff; 
        border-radius: 10px;
      }

      @media print {
        @page {
          size: A4 portrait;
          margin: 0; /* Let the component handle margins */
        }
        html, body {
            background-color: #ffffff !important;
            width: 100%;
            height: auto;
            margin: 0;
            padding: 0;
            overflow: visible !important;
        }
        body {
          color: #000000 !important;
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
        }
        .no-print {
            display: none !important;
        }
        main {
            padding: 0 !important;
            margin: 0 !important;
            width: 100% !important;
            display: block !important;
            overflow: visible !important;
        }
        #root {
          width: 100%;
          overflow: visible;
        }
      }
